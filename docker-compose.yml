version: "3.8"

services:
  gitea:
    image: docker.gitea.com/gitea:1.24.4
    restart: unless-stopped
    environment:
      - USER_UID=1000
      - USER_GID=1000
      # --- Pulled from Dokploy Environment ---
      - GITEA__server__DOMAIN=${GITEA__server__DOMAIN}
      - GITEA__server__SSH_DOMAIN=${GITEA__server__SSH_DOMAIN}
      - GITEA__server__ROOT_URL=${GITEA__server__ROOT_URL}
      - GITEA__server__DISABLE_SSH=${GITEA__server__DISABLE_SSH}
      - GITEA__service__DISABLE_REGISTRATION=${GITEA__service__DISABLE_REGISTRATION}
      - GITEA__service__REQUIRE_SIGNIN_VIEW=${GITEA__service__REQUIRE_SIGNIN_VIEW}
      - GITEA__service__REGISTER_EMAIL_CONFIRM=${GITEA__service__REGISTER_EMAIL_CONFIRM}
      - GITEA__service__ENABLE_CAPTCHA=${GITEA__service__ENABLE_CAPTCHA}
      - GITEA__service__DEFAULT_KEEP_EMAIL_PRIVATE=${GITEA__service__DEFAULT_KEEP_EMAIL_PRIVATE}
      - GITEA__openid__ENABLE_OPENID_SIGNIN=${GITEA__openid__ENABLE_OPENID_SIGNIN}
      - GITEA__openid__ENABLE_OPENID_SIGNUP=${GITEA__openid__ENABLE_OPENID_SIGNUP}
    volumes:
      - gitea-data:/data
    expose:
      - "3000" # Web UI
      - "22"   # SSH (internal only)
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  gitea-data: {}
